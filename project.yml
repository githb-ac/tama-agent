name: Tamagotchai
options:
  bundleIdPrefix: com.unstablemind
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.1"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Tamagotchai:
    type: application
    platform: macOS
    sources:
      - path: tamagotchai/Sources
      - path: tamagotchai/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.unstablemind.tamagotchai
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.lifestyle"
        INFOPLIST_KEY_CFBundleDisplayName: Tamagotchai
        CODE_SIGN_ENTITLEMENTS: tamagotchai/Entitlements/Tamagotchai.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
    entitlements:
      path: tamagotchai/Entitlements/Tamagotchai.entitlements
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --config "${SRCROOT}/.swiftlint.yml"
          fi
        outputFiles: []
      - name: SwiftFormat Check
        basedOnDependencyAnalysis: false
        script: |
          if command -v swiftformat >/dev/null 2>&1; then
            swiftformat --lint --config "${SRCROOT}/.swiftformat" "${SRCROOT}/tamagotchai/Sources"
          fi
        outputFiles: []
