name: Tamagotchai
options:
  bundleIdPrefix: com.unstablemind
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "26.1"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"

packages:
  RiveRuntime:
    url: https://github.com/rive-app/rive-ios
    from: "6.18.0"
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: "2.2.1"
  NotchNotification:
    url: https://github.com/Lakr233/NotchNotification
    from: "1.2.1"
  kokoro-ios:
    url: https://github.com/mlalma/kokoro-ios.git
    from: "1.0.11"
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    exactVersion: "0.30.2"
  MLXUtilsLibrary:
    url: https://github.com/mlalma/MLXUtilsLibrary.git
    exactVersion: "0.0.6"

schemes:
  Tamagotchai:
    build:
      targets:
        Tamagotchai: all
        TamagotchaiTests: [test]
    test:
      targets:
        - TamagotchaiTests

targets:
  Tamagotchai:
    type: application
    platform: macOS
    sources:
      - path: tamagotchai/Sources
      - path: tamagotchai/Assets.xcassets
      - path: tamagotchai/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.unstablemind.tamagotchai
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.lifestyle"
        INFOPLIST_KEY_CFBundleDisplayName: Tamagotchai
        CODE_SIGN_ENTITLEMENTS: tamagotchai/Entitlements/Tamagotchai.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Tamagotchai needs microphone access for voice wake word detection and speech recognition."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Tamagotchai uses speech recognition to transcribe your voice commands."
    dependencies:
      - package: RiveRuntime
      - package: Highlightr
      - package: kokoro-ios
        product: KokoroSwift
      - package: mlx-swift
        product: MLX
      - package: MLXUtilsLibrary
        product: MLXUtilsLibrary
    entitlements:
      path: tamagotchai/Entitlements/Tamagotchai.entitlements
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint lint --config "${SRCROOT}/.swiftlint.yml" || true
          fi
        outputFiles: []
      - name: SwiftFormat Check
        basedOnDependencyAnalysis: false
        script: |
          if command -v swiftformat >/dev/null 2>&1; then
            swiftformat --lint --config "${SRCROOT}/.swiftformat" "${SRCROOT}/tamagotchai/Sources" || true
          fi
        outputFiles: []
  TamagotchaiTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: tamagotchai/Tests
    dependencies:
      - target: Tamagotchai
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.unstablemind.tamagotchai.tests
        GENERATE_INFOPLIST_FILE: YES
