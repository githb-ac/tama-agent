name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      NOTARIZE_PASSWORD: ${{ secrets.NOTARIZE_PASSWORD }}
      DEVELOPER_ID_NAME: ${{ secrets.DEVELOPER_ID_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          ls /Applications | grep Xcode
          sudo xcode-select --switch /Applications/Xcode_26.3.app/Contents/Developer || \
          sudo xcode-select --switch /Applications/Xcode_26.2.app/Contents/Developer || \
          sudo xcode-select --switch /Applications/Xcode_26.1.app/Contents/Developer
          xcodebuild -version
          swift --version

      - name: Install tools
        run: brew install xcodegen create-dmg

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE_P12" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build app
        run: |
          xcodebuild -project Tama.xcodeproj \
            -scheme Tama \
            -configuration Release \
            -arch arm64 \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$DEVELOPER_ID_NAME" \
            DEVELOPMENT_TEAM=396M7LY29W \
            OTHER_CODE_SIGN_FLAGS="--options runtime" \
            clean build

      - name: Deep sign all nested code
        run: |
          APP_PATH="build/Build/Products/Release/Tama.app"

          # Re-sign all nested frameworks and dylibs with hardened runtime
          find "$APP_PATH" -type f -perm +111 -o -name "*.dylib" -o -name "*.framework" | while read -r binary; do
            # Skip directories named .framework, only sign actual binaries
            if [ -f "$binary" ] && file "$binary" | grep -q "Mach-O"; then
              echo "Signing: $binary"
              codesign --force --options runtime --timestamp \
                --sign "$DEVELOPER_ID_NAME" "$binary" || true
            fi
          done

          # Re-sign all .framework bundles (outer wrapper)
          find "$APP_PATH" -name "*.framework" -type d | while read -r fw; do
            echo "Signing framework bundle: $fw"
            codesign --force --options runtime --timestamp \
              --sign "$DEVELOPER_ID_NAME" "$fw" || true
          done

          # Finally re-sign the app itself
          codesign --force --options runtime --timestamp \
            --sign "$DEVELOPER_ID_NAME" "$APP_PATH"

          # Verify
          codesign --verify --deep --strict "$APP_PATH"
          echo "Code signing verification passed"

      - name: Notarize app
        run: |
          APP_PATH="build/Build/Products/Release/Tama.app"

          ditto -c -k --keepParent "$APP_PATH" "$RUNNER_TEMP/Tama.zip"

          # Submit and capture the submission ID
          SUBMIT_OUTPUT=$(xcrun notarytool submit "$RUNNER_TEMP/Tama.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$NOTARIZE_PASSWORD" \
            --wait --timeout 15m 2>&1) || true

          echo "$SUBMIT_OUTPUT"

          # Extract submission ID
          SUBMISSION_ID=$(echo "$SUBMIT_OUTPUT" | grep "id:" | head -1 | awk '{print $NF}')

          # If it failed, fetch the log for debugging
          if echo "$SUBMIT_OUTPUT" | grep -q "Invalid"; then
            echo "=== NOTARIZATION LOG ==="
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$NOTARIZE_PASSWORD" || true
            exit 1
          fi

          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        run: |
          APP_PATH="build/Build/Products/Release/Tama.app"

          create-dmg \
            --volname "Tama" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Tama.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "Tama-${GITHUB_REF_NAME}.dmg" \
            "$APP_PATH" || true

          if [ ! -f "Tama-${GITHUB_REF_NAME}.dmg" ]; then
            echo "DMG creation failed"
            exit 1
          fi

          # Notarize the DMG
          xcrun notarytool submit "Tama-${GITHUB_REF_NAME}.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$NOTARIZE_PASSWORD" \
            --wait --timeout 15m

          xcrun stapler staple "Tama-${GITHUB_REF_NAME}.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Tama-*.dmg
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
