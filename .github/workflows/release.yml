name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          brew install xcodegen create-dmg

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import signing certificate
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$APPLE_CERTIFICATE_P12" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build app
        env:
          DEVELOPER_ID_NAME: ${{ secrets.DEVELOPER_ID_NAME }}
        run: |
          xcodebuild -project Tamagotchai.xcodeproj \
            -scheme Tamagotchai \
            -configuration Release \
            -arch arm64 \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$DEVELOPER_ID_NAME" \
            DEVELOPMENT_TEAM=396M7LY29W \
            OTHER_CODE_SIGN_FLAGS="--options runtime" \
            clean build

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARIZE_PASSWORD: ${{ secrets.NOTARIZE_PASSWORD }}
        run: |
          APP_PATH="build/Build/Products/Release/Tamagotchai.app"

          # Create zip for notarization
          ditto -c -k --keepParent "$APP_PATH" "$RUNNER_TEMP/Tamagotchai.zip"

          # Submit for notarization
          xcrun notarytool submit "$RUNNER_TEMP/Tamagotchai.zip" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$NOTARIZE_PASSWORD" \
            --wait --timeout 15m

          # Staple the ticket
          xcrun stapler staple "$APP_PATH"

      - name: Create DMG
        run: |
          APP_PATH="build/Build/Products/Release/Tamagotchai.app"

          create-dmg \
            --volname "Tamagotchai" \
            --volicon "$APP_PATH/Contents/Resources/AppIcon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Tamagotchai.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "Tamagotchai-${GITHUB_REF_NAME}.dmg" \
            "$APP_PATH" || true

          # create-dmg returns 2 on success when --no-internet-enable is used
          if [ ! -f "Tamagotchai-${GITHUB_REF_NAME}.dmg" ]; then
            echo "DMG creation failed"
            exit 1
          fi

          # Notarize the DMG too
          xcrun notarytool submit "Tamagotchai-${GITHUB_REF_NAME}.dmg" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.NOTARIZE_PASSWORD }}" \
            --wait --timeout 15m

          xcrun stapler staple "Tamagotchai-${GITHUB_REF_NAME}.dmg"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Tamagotchai-*.dmg
          generate_release_notes: true
          draft: false
          prerelease: false

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
