included:
  - tamagotchai/Sources

excluded:
  - .build
  - DerivedData

disabled_rules:
  - trailing_comma
  - opening_brace

opt_in_rules:
  - closure_spacing
  - empty_count
  - explicit_init
  - fatal_error_message
  - first_where
  - implicitly_unwrapped_optional
  - modifier_order
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - redundant_nil_coalescing
  - sorted_first_last
  - vertical_parameter_alignment_on_call

line_length:
  warning: 140
  error: 200

type_body_length:
  warning: 900
  error: 1200

file_length:
  warning: 1400
  error: 2000

function_body_length:
  warning: 140
  error: 200

cyclomatic_complexity:
  warning: 20
  error: 30

large_tuple:
  warning: 4
  error: 5

identifier_name:
  min_length:
    warning: 1
    error: 0
  max_length:
    warning: 60
    error: 80
  excluded:
    - i
    - x
    - y
    - h
    - m
    - p
    - s
    - t
    - v
    - w

nesting:
  type_level: 2
